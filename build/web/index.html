<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="School Management System">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SmartEdu">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>SmartEdu</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; }
    #loading {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: opacity 0.5s ease;
    }
    .loader-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      animation: iconPulse 2s ease-in-out infinite;
    }
    .loader-icon svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: #60A5FA;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .loader-text {
      color: #94A3B8;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }
    .loader-bar-track {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .loader-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3B82F6, #60A5FA);
      border-radius: 4px;
      animation: barFill 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    @keyframes barFill {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="loader-text">Loading...</div>
    <div class="loader-bar-track">
      <div class="loader-bar-fill"></div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function hideLoading() {
      var el = document.getElementById('loading');
      if (!el || el.dataset.hidden) return;
      el.dataset.hidden = 'true';
      el.style.opacity = '0';
      setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
    }
    var observer = new MutationObserver(function(mutations) {
      for (var i = 0; i < mutations.length; i++) {
        for (var j = 0; j < mutations[i].addedNodes.length; j++) {
          var node = mutations[i].addedNodes[j];
          if (node.tagName === 'CANVAS' || (node.querySelector && node.querySelector('canvas'))) {
            observer.disconnect();
            setTimeout(hideLoading, 400);
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
    setTimeout(hideLoading, 15000);
  </script>
</body>
</html>
